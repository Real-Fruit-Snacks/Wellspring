<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5"/>
      <stop offset="40%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
    <linearGradient id="wave1-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="wave2-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0.03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="800" height="280" rx="12" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- Decorative waves -->
  <path d="M0 200 Q100 170 200 190 Q300 210 400 185 Q500 160 600 180 Q700 200 800 175 L800 280 L0 280 Z" fill="url(#wave1-grad)"/>
  <path d="M0 220 Q150 195 250 215 Q350 235 450 210 Q550 185 650 205 Q750 225 800 200 L800 280 L0 280 Z" fill="url(#wave2-grad)"/>

  <!-- Decorative dots -->
  <circle cx="680" cy="45" r="1.5" fill="#94e2d5" opacity="0.4"/>
  <circle cx="700" cy="35" r="1" fill="#89b4fa" opacity="0.3"/>
  <circle cx="720" cy="50" r="1.5" fill="#cba6f7" opacity="0.35"/>
  <circle cx="740" cy="40" r="1" fill="#94e2d5" opacity="0.25"/>
  <circle cx="695" cy="55" r="1" fill="#89b4fa" opacity="0.3"/>
  <circle cx="735" cy="30" r="1.5" fill="#cba6f7" opacity="0.2"/>
  <circle cx="755" cy="48" r="1" fill="#94e2d5" opacity="0.35"/>
  <circle cx="715" cy="62" r="1" fill="#89b4fa" opacity="0.25"/>
  <circle cx="760" cy="35" r="1.5" fill="#cba6f7" opacity="0.3"/>
  <circle cx="670" cy="60" r="1" fill="#94e2d5" opacity="0.2"/>
  <circle cx="750" cy="58" r="1" fill="#89b4fa" opacity="0.15"/>
  <circle cx="690" cy="68" r="1.5" fill="#cba6f7" opacity="0.25"/>

  <!-- Title -->
  <text x="400" y="115" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="64" font-weight="bold" letter-spacing="6" fill="url(#title-grad)" filter="url(#glow)">WELLSPRING</text>

  <!-- Accent line -->
  <line x1="240" y1="135" x2="560" y2="135" stroke="url(#accent-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="400" y="165" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="13" letter-spacing="4" fill="#a6adc8" opacity="0.9">PAYLOAD DELIVERY FOR RED TEAMS</text>

  <!-- Stat badges -->
  <!-- Badge 1: zero deps -->
  <rect x="118" y="195" width="120" height="28" rx="14" fill="#313244" opacity="0.8"/>
  <circle cx="136" cy="209" r="3.5" fill="#a6e3a1"/>
  <text x="185" y="214" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="11" fill="#cdd6f4">zero deps</text>

  <!-- Badge 2: token-gated -->
  <rect x="258" y="195" width="130" height="28" rx="14" fill="#313244" opacity="0.8"/>
  <circle cx="276" cy="209" r="3.5" fill="#89b4fa"/>
  <text x="330" y="214" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="11" fill="#cdd6f4">token-gated</text>

  <!-- Badge 3: 12 loaders -->
  <rect x="408" y="195" width="128" height="28" rx="14" fill="#313244" opacity="0.8"/>
  <circle cx="426" cy="209" r="3.5" fill="#cba6f7"/>
  <text x="480" y="214" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="11" fill="#cdd6f4">12 loaders</text>

  <!-- Badge 4: encrypt at rest -->
  <rect x="556" y="195" width="140" height="28" rx="14" fill="#313244" opacity="0.8"/>
  <circle cx="574" cy="209" r="3.5" fill="#94e2d5"/>
  <text x="634" y="214" text-anchor="middle" font-family="'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="11" fill="#cdd6f4">encrypt at rest</text>
</svg>