name: Feature Request
description: Suggest a new feature or enhancement for Wellspring
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe what you'd like to see added or improved.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is this related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: It would be useful if...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Wellspring does this relate to?
      options:
        - Server (HTTPS/TLS listeners)
        - Token management
        - Payload encryption
        - Delivery methods / loaders
        - Stager generation
        - Operator console (CLI)
        - Anti-forensics / memory zeroing
        - Build system
        - Tests
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any additional context, mockups, or references.
    validations:
      required: false
