<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: peach to yellow (Infrastructure) -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fab387"/>
      <stop offset="40%" stop-color="#fab387"/>
      <stop offset="100%" stop-color="#f9e2af"/>
    </linearGradient>

    <!-- Fountain arc gradient: peach to yellow horizontal -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fab387"/>
      <stop offset="100%" stop-color="#f9e2af"/>
    </linearGradient>

    <!-- Base line gradient -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#585b70"/>
      <stop offset="50%" stop-color="#6c7086"/>
      <stop offset="100%" stop-color="#585b70"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#fab387" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>

    <!-- Source point glow -->
    <filter id="nodeglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#fab387" opacity="0.04"/>

    <!-- Server platform base line -->
    <line x1="40" y1="108" x2="120" y2="108"
          stroke="url(#g3)" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

    <!-- Source point at bottom-center (the server) -->
    <circle cx="80" cy="108" r="5" fill="#fab387" opacity="0.9" filter="url(#nodeglow)"/>
    <circle cx="80" cy="108" r="2.5" fill="#1e1e2e"/>

    <!-- Center fountain arc: straight up from source -->
    <path d="M 80 108 Q 80 60 80 30"
          stroke="url(#g2)" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>

    <!-- Left fountain arc: arcing left from source -->
    <path d="M 80 108 Q 55 58 42 35"
          stroke="url(#g2)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>

    <!-- Right fountain arc: arcing right from source -->
    <path d="M 80 108 Q 105 58 118 35"
          stroke="url(#g2)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75"/>

    <!-- Droplet dots at arc tips (payload deliveries) -->
    <circle cx="80" cy="28" r="3" fill="#f9e2af" opacity="0.9"/>
    <circle cx="40" cy="33" r="2.5" fill="#f9e2af" opacity="0.8"/>
    <circle cx="120" cy="33" r="2.5" fill="#f9e2af" opacity="0.8"/>

    <!-- Particle dots along fountain arcs -->
    <circle cx="80" cy="68" r="1.5" fill="#fab387" opacity="0.6"/>
    <circle cx="80" cy="48" r="1.2" fill="#f9e2af" opacity="0.5"/>
    <circle cx="66" cy="72" r="1.4" fill="#fab387" opacity="0.55"/>
    <circle cx="52" cy="52" r="1.3" fill="#f9e2af" opacity="0.45"/>
    <circle cx="94" cy="72" r="1.4" fill="#fab387" opacity="0.55"/>
    <circle cx="108" cy="52" r="1.3" fill="#f9e2af" opacity="0.45"/>

    <!-- Faint mist particles near the top -->
    <circle cx="60" cy="40" r="1" fill="#f9e2af" opacity="0.3"/>
    <circle cx="100" cy="40" r="1" fill="#f9e2af" opacity="0.3"/>
    <circle cx="72" cy="36" r="1.2" fill="#fab387" opacity="0.25"/>
    <circle cx="88" cy="36" r="1.2" fill="#fab387" opacity="0.25"/>

    <!-- Entry/exit nodes on hex frame -->
    <circle cx="80" cy="6" r="2" fill="#f9e2af" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#fab387" opacity="0.3"/>

    <!-- Subtle base platform particles -->
    <circle cx="50" cy="110" r="1" fill="#585b70" opacity="0.3"/>
    <circle cx="110" cy="110" r="1" fill="#585b70" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "WELLSPRING" -->
  <text x="430" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="56" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">WELLSPRING</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="580" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline -->
  <text x="430" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">PAYLOAD DELIVERY SERVER</text>

  <!-- Descriptor -->
  <text x="430" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">GO  ·  AES-GCM  ·  TOKEN-GATED  ·  ZERO-DEP</text>
</svg>
